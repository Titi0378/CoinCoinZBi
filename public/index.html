<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coincoin Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* CSS personnalisé pour le plein écran vidéo */
        .video-fullscreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100% !important; height: 100% !important;
            z-index: 50; object-fit: contain; background: black;
        }
    </style>
</head>
<body class="bg-gray-950 text-white font-sans overflow-hidden">

    <div id="landing-screen" class="min-h-screen flex flex-col items-center justify-center bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-gray-800 to-gray-950 relative z-50">
        <div class="bg-gray-900/80 p-10 rounded-2xl border border-gray-700 shadow-2xl backdrop-blur-sm text-center">
            <h1 class="text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-yellow-500 mb-2">Coincoin Stream</h1>
            <p class="text-gray-400 mb-8">Sélectionnez votre rôle pour rejoindre la partie</p>
            
            <div class="flex gap-4 justify-center">
                <button onclick="joinAs('host')" class="px-8 py-4 bg-orange-600 hover:bg-orange-500 text-white font-bold rounded-lg transition-all shadow-[0_0_15px_rgba(234,88,12,0.5)]">
                    🎛️ Régie (Host)
                </button>
                <button onclick="joinAs('camera')" class="px-8 py-4 bg-gray-700 hover:bg-gray-600 text-white font-bold rounded-lg transition-all border border-gray-600">
                    📷 Caméra
                </button>
            </div>
        </div>
    </div>

    <div id="host-screen" class="hidden h-screen flex">
        <div class="flex-1 relative bg-black p-4">
            <div id="video-grid" class="w-full h-full grid grid-cols-1 md:grid-cols-2 gap-4 auto-rows-fr">
                </div>
            <div id="overlay-container" class="pointer-events-none absolute inset-0 z-40"></div>
        </div>
        
        <div class="w-[300px] border-l border-gray-800 bg-gray-900 flex flex-col">
            <div class="p-4 border-b border-gray-800 font-bold text-orange-500">🎵 Music Assistant</div>
            <iframe src="about:blank" class="w-full flex-1 border-none" title="Music Player"></iframe>
        </div>
    </div>

    <div id="camera-screen" class="hidden h-screen flex flex-col items-center justify-center bg-black relative">
        <div class="absolute top-4 left-4 bg-red-600 animate-pulse px-3 py-1 rounded-full text-xs font-bold z-10">EN DIRECT</div>
        <video id="local-video" autoplay muted playsinline class="w-full h-full object-cover"></video>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
